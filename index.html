<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hàng Gửi Dịch Vụ Công Ích Phú Nhuận</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
    <script type="text/javascript">
	    var spData = null;

        function doData(json) {
            spData = json.feed.entry;
        }
        function readData() {
            var data = spData;
            var strData = '';
            // consolr.log
            for (var r = 0; r < data.length; r++) {
                var cell = data[r]["gs$cell"];
				
                if (r >= 0 && r < 4) {
                    if (cell["col"] == "1") {
						strData += '<thead class="thead-light">';
                        strData += '<tr>';
                        strData += '<th scope="col"><b>' + cell["$t"] + '</b></th>';
                    } else if (cell["col"] == "2") {
                        strData += '<th scope="col"><b>' + cell["$t"] + '</b></th>';
                        strData += '</tr>';
						strData += '</thead>';
                    }
                } else {
                    if (cell["col"] == "1") {
						
                        strData += '<tr>';
						strData += '<th scope="row"';
                        strData += '<td>' + cell["$t"] + '</td>';
                    } else if (cell["col"] == "2") {
                        strData += '<td><b>' + cell["$t"] + '</b></td>';
                        strData += '<th>';	
						
                    }
                }
            }
			strData += '</tr>';
            $("#data").after(strData);
        }
        $(document).ready(function() {
            readData();
        });
        
    </script>
    <script src="https://spreadsheets.google.com/feeds/cells/1WvuZnlKJEBf85AZTukMtVC5j6wGeWtqveQFjydpPgds/1/public/values?alt=json-in-script&callback=doData"></script>
</head>
<body>
<table class="table">

    <tbody id="data">
            
          </tbody>

</table>
</body>
</html>
