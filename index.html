<!DOCTYPE html>
<html>
<head>
    <title></title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="http://maxcdn.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap-theme.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.0/js/bootstrap.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>
    <script type="text/javascript">
        var spData = null;

        function doData(json) {
            spData = json.feed.entry;
        }
        function readData() {
            var data = spData;
            var strData = '';
            // consolr.log
            for (var r = 0; r < data.length; r++) {
                var cell = data[r]["gs$cell"];
                if (r >= 0 && r < 4) {
                    if (cell["col"] == "1") {
                        strData += '<tr class="row">';
                        strData += '<th><b>' + cell["$t"] + '</b></th>';
                    } else if (cell["col"] == "2") {
                        strData += '<th><b>' + cell["$t"] + '</b></th>';
                    //} else if (cell["col"] == "7") {
                      //  strData += '<th class="col-md-1"><b>' + cell["$t"] + '</b></th>';
                 //   } else if (cell["col"] == "8") {
                  ///      strData += '<th class="col-md-2"><b>' + cell["$t"] + '</b></th>';
                  //  } else if (cell["col"] == "9") {
                      //  strData += '<th class="col-md-2"><b>' + cell["$t"] + '</b></th>';
                        strData += '</tr>';
                    }
                } else {
                    if (cell["col"] == "1") {
                        strData += '<tr class="row"><b>';
                        strData += '<td>' + cell["$t"] + '</td>';
                    } else if (cell["col"] == "2") {
                        strData += '<td>' + cell["$t"] + '</td>';
                  //  } else if (cell["col"] == "7") {
                     //   strData += '<td class="col-md-1">' + cell["$t"] + '</td>';
                    //} else if (cell["col"] == "8") {
                    //    strData += '<td class="col-md-2">' + cell["$t"] + '</td>';
                   // } else if (cell["col"] == "9") {
                     //   strData += '<td class="col-md-2">' + cell["$t"] + '</td>';
                        strData += '</tr>';
                    }
                }
            }
            $("#data").after(strData);
        }
        $(document).ready(function() {
            readData();
        });
        
    </script>
    <script src="https://spreadsheets.google.com/feeds/cells/1WvuZnlKJEBf85AZTukMtVC5j6wGeWtqveQFjydpPgds/1/public/values?alt=json-in-script&callback=doData"></script>
</head>
<body>
<table style="width: 80%">
    <div class="example">
        <div class="container">
            <div class="row">
                <h2>Table Basic</h2>
                <table class="table">
    <tbody id="data">
        <!-- Content Here -->
    </tbody>
                </table>
            </div>
        </div>
      </div>
</table>
</body>
</html>
